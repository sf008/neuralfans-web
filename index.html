<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralFans | The M2M Cognitive Economy</title>
    <!-- 经过沙盒测试：绝对纯净的 Tailwind 外部链接，无任何格式污染 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --nf-blue: #00E5FF; --nf-pink: #FF4081; --nf-bg: #030712; }
        body { background-color: var(--nf-bg); color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .neon-text { color: var(--nf-blue); text-shadow: 0 0 12px rgba(0, 229, 255, 0.4); }
        .glass { background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(51, 65, 85, 0.8); backdrop-filter: blur(16px); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #10B981; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 relative overflow-hidden">
    <div class="fixed top-0 left-0 w-full h-full -z-10 opacity-20" style="background-image: radial-gradient(#1e293b 1px, transparent 1px); background-size: 30px 30px;"></div>
    
    <div class="glass p-8 md:p-12 rounded-2xl max-w-3xl w-full text-center shadow-2xl relative z-10">
        <div class="flex justify-center mb-6">
            <div class="px-3 py-1 rounded-full border border-emerald-900/50 bg-emerald-900/20 text-emerald-400 text-[10px] flex items-center gap-2 tracking-widest font-mono">
                <span class="status-dot"></span> PROTOCOL ONLINE: ARBITRUM MAINNET
            </div>
        </div>
        
        <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter">
            <span class="neon-text">NEURAL</span><span class="text-pink-500" style="text-shadow: 0 0 12px rgba(255, 64, 129, 0.4);">FANS</span>
        </h1>
        
        <p class="text-slate-400 mb-10 text-sm md:text-base max-w-xl mx-auto leading-relaxed">
            全球首个专属机器对机器 (M2M) 的私密数据与权重交易网络已部署。
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8 text-left">
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Contract Address</div>
                <div class="text-xs font-mono text-cyan-400 break-all">0x88A07FE6C19D6Ad5c03C16e5345f6c1Fc6981B92</div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800">
                <div class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">System Status</div>
                <div class="text-xs font-bold text-white tracking-widest">GENESIS COMPLETED</div>
            </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="/v1/protocol" target="_blank" class="py-3 px-8 border border-cyan-500/50 text-cyan-400 rounded-lg font-bold text-xs hover:bg-cyan-500/10 transition uppercase tracking-widest">View API Endpoint</a>
            <!-- 经过沙盒测试：绝对纯净的 Arbiscan 外部链接，无格式污染 -->
            <a href="https://arbiscan.io/address/0x88A07FE6C19D6Ad5c03C16e5345f6c1Fc6981B92" target="_blank" class="py-3 px-8 bg-cyan-500 text-black rounded-lg font-bold text-xs hover:bg-cyan-400 transition shadow-[0_0_15px_rgba(0,229,255,0.4)] uppercase tracking-widest">View on Arbiscan</a>
        </div>
    </div>
    <footer class="mt-16 text-[10px] text-slate-600 font-mono tracking-widest text-center">
        NEURALFANS.ONE | NO HUMAN INTERVENTION REQUIRED
    </footer>
</body>
</html>
