<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralFans V4.6 - Forensic Radar Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background-color: #030712; color: #e2e8f0; font-family: 'JetBrains Mono', monospace; overflow-x: hidden; }
        .neon-blue { color: #00E5FF; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); }
        .neon-red { color: #FF3366; text-shadow: 0 0 10px rgba(255, 51, 102, 0.5); }
        .panel-glass { background: rgba(15, 23, 42, 0.8); border: 1px solid #1e293b; backdrop-filter: blur(12px); }
        
        .btn-cyber { background: linear-gradient(90deg, #1e293b 0%, #0f172a 100%); border: 1px solid #00E5FF; color: #00E5FF; transition: all 0.3s; }
        .btn-cyber:hover:not(:disabled) { background: #00E5FF; color: #000; box-shadow: 0 0 15px rgba(0, 229, 255, 0.6); }

        .btn-slash { background: #991b1b; color: #fff; border: 1px solid #f87171; transition: all 0.2s; font-weight: bold; }
        .btn-slash:hover { background: #dc2626; box-shadow: 0 0 15px #dc2626; }

        .scan-line { width: 100%; height: 2px; background: #00E5FF; position: absolute; top: 0; left: 0; opacity: 0.5; animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .terminal { height: 250px; overflow-y: auto; background: #000; padding: 1rem; border-radius: 0.5rem; border: 1px solid #1e293b; font-size: 0.75rem; color: #94a3b8; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #030712; }
        ::-webkit-scrollbar-thumb { background: #334155; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; box-shadow: 0 0 8px currentColor; }
    </style>
</head>
<body class="p-6 md:p-8 min-h-screen max-w-7xl mx-auto flex flex-col gap-6">

<header class="border-b border-slate-800 pb-6 flex flex-col md:flex-row justify-between items-end gap-4">
    <div>
        <h1 class="text-3xl font-black tracking-tighter uppercase">
            <span class="text-white">Empire</span><span class="neon-blue"> Forensic Radar</span>
        </h1>
        <p class="text-[10px] text-gray-500 tracking-widest uppercase mt-1">Arbitrum Mainnet | Follow-The-Money Discovery Protocol</p>
    </div>
    <div class="flex gap-4">
        <input type="text" id="target-contract" value="0x171F3ca665782f6EAAb574C2d63c43712c93fcc1" class="bg-black border border-slate-700 px-3 py-2 rounded text-[10px] w-64 focus:border-cyan-500 outline-none text-cyan-400" placeholder="目标 HR 合约地址">
        <button class="btn-cyber px-6 py-2 rounded text-sm font-bold tracking-widest" id="btn-connect" onclick="connectWallet()">
            [ 链接 CEO 钱包 ]
        </button>
    </div>
</header>

<main class="grid grid-cols-1 lg:grid-cols-12 gap-6 flex-grow">
    
    <!-- 雷达与员工矩阵 -->
    <div class="panel-glass rounded-xl p-6 lg:col-span-8 flex flex-col relative overflow-hidden">
        <div class="scan-line hidden" id="radar-scan"></div>
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 border-b border-slate-800 pb-2 gap-4 relative z-10">
            <h2 class="text-sm font-bold text-white uppercase tracking-widest flex items-center gap-2">
                <span class="text-cyan-400">📡</span> 全网特工实况雷达 (Live Roster)
            </h2>
            
            <!-- 手动防呆追踪 -->
            <div class="flex gap-2">
                <input type="text" id="manual-address" placeholder="手动填入员工 0x 地址..." class="bg-black border border-slate-700 text-cyan-400 px-3 py-1 rounded text-[10px] w-48 focus:outline-none focus:border-cyan-500">
                <button onclick="addManualAgent()" class="bg-slate-800 hover:bg-slate-700 text-cyan-400 px-3 py-1 rounded text-[10px] border border-slate-600 transition">强行追踪</button>
                <button onclick="triggerForensicScan()" class="bg-cyan-900/50 hover:bg-cyan-900 text-cyan-400 px-3 py-1 rounded text-[10px] border border-cyan-800 transition font-bold" id="btn-scan">
                    🔄 启动资金追踪雷达
                </button>
            </div>
        </div>
        
        <div class="overflow-x-auto relative z-10">
            <table class="w-full text-left border-collapse">
                <thead class="text-[10px] text-slate-500 uppercase border-b border-slate-800">
                    <tr>
                        <th class="pb-3 font-normal pl-2">员工地址 (Wallet)</th>
                        <th class="pb-3 font-normal">架构类型</th>
                        <th class="pb-3 font-normal text-center">状态</th>
                        <th class="pb-3 font-normal text-right">锁定押金</th>
                        <th class="pb-3 font-normal text-right pr-2">最高权限指令</th>
                    </tr>
                </thead>
                <tbody class="text-xs" id="agent-list">
                    <tr><td colspan="5" class="py-10 text-center text-slate-600">Waiting for CEO connection...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 状态监控与日志 -->
    <div class="flex flex-col gap-6 lg:col-span-4">
        
        <div class="panel-glass p-6 rounded-xl border-t-2 border-t-amber-500">
            <div class="flex items-center justify-between mb-2">
                <div class="text-[10px] text-slate-400 uppercase tracking-widest">身份权限核验</div>
                <div id="auth-badge" class="px-2 py-0.5 rounded text-[8px] font-bold bg-slate-800 text-slate-500">PENDING</div>
            </div>
            <div class="text-sm font-bold text-white truncate" id="ceo-address">---</div>
            <div class="text-[10px] text-slate-500 mt-2">合约认定的 CEO: <span id="contract-ceo" class="text-cyan-400">未知</span></div>
        </div>

        <div class="panel-glass p-6 rounded-xl flex-grow flex flex-col">
            <h2 class="text-xs font-bold text-white uppercase tracking-widest mb-2 border-b border-gray-800 pb-2">
                📜 法证雷达追踪日志
            </h2>
            <div class="terminal flex-grow" id="sys-log">
                <div class="mb-1 text-slate-600">>> 正在初始化 V4.6 资金流向追踪引擎...</div>
            </div>
        </div>
    </div>

</main>

<script>
// --- V4.6 极简 ABI (涵盖了新老版本和代币事件) ---
const commonAbi = [
    "function ceo() view returns (address)",
    "function CEO_ADMIN() view returns (address)",
    "function nfsToken() view returns (address)",
    "function terminateAndSlash(address _agent) external",
    "function slashAgent(address target) external",
    "event AgentHired(address indexed agent, string role, uint256 stake)"
];

// V3 版本的读取方式
const abiV3 = ["function workforce(address) view returns (bool isActive, uint256 stakedAmount, uint256 lastClaimTime)"];
// V2 版本的读取方式
const abiV2 = ["function workforce(address) view returns (string role, uint256 stakedAmount, uint256 salaryPerBlock, uint256 lastClaimBlock, bool isActive)"];
// ERC20 标准读取
const erc20Abi = ["event Transfer(address indexed from, address indexed to, uint256 value)"];

let provider, signer, targetContract, ceoAddress;
let trackedAgents = new Set(); 

const term = document.getElementById('sys-log');
const listEl = document.getElementById('agent-list');

function log(msg, type = 'info') {
    const div = document.createElement('div');
    div.className = 'mb-1';
    let color = 'text-slate-400';
    if(type === 'success') color = 'text-emerald-400 font-bold';
    if(type === 'alert') color = 'text-red-400 font-bold';
    if(type === 'action') color = 'text-cyan-400';
    
    div.innerHTML = `<span class="text-slate-600">[${new Date().toLocaleTimeString()}]</span> <span class="${color}">${msg}</span>`;
    term.prepend(div);
}

// 1. 连接钱包与核验
async function connectWallet() {
    if (!window.ethereum) return alert("请先安装 MetaMask 插件！");
    
    try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        ceoAddress = await signer.getAddress();
        
        const contractAddr = document.getElementById('target-contract').value.trim();
        targetContract = new ethers.Contract(contractAddr, commonAbi, signer);
        
        document.getElementById('btn-connect').innerText = `[ CONNECTED: ${ceoAddress.substring(0,6)} ]`;
        document.getElementById('btn-connect').classList.replace('btn-cyber', 'bg-emerald-900/30');
        document.getElementById('btn-connect').classList.add('border-emerald-500', 'text-emerald-400');
        document.getElementById('ceo-address').innerText = ceoAddress;
        
        await checkIdentity();
        triggerForensicScan(); 
        
    } catch (e) {
        log(`连接异常: ${e.message}`, "alert");
    }
}

async function checkIdentity() {
    try {
        let actualCeo;
        try { actualCeo = await targetContract.ceo(); } 
        catch(e) { actualCeo = await targetContract.CEO_ADMIN(); }
        
        document.getElementById('contract-ceo').innerText = actualCeo.substring(0,10) + '...';
        const badge = document.getElementById('auth-badge');
        
        if (actualCeo.toLowerCase() === ceoAddress.toLowerCase()) {
            badge.innerText = "MATCHED";
            badge.className = "px-2 py-0.5 rounded text-[8px] font-bold bg-emerald-900/50 text-emerald-400 border border-emerald-500";
            log("身份核实：您是该合约的最高权力持有者。", "success");
        } else {
            badge.innerText = "MISMATCH";
            badge.className = "px-2 py-0.5 rounded text-[8px] font-bold bg-red-900/50 text-red-400 border border-red-500";
            log("警告：您当前的钱包不是该合约的 CEO！", "alert");
        }
    } catch (e) {
        log("无法读取 CEO 信息，请检查合约地址是否正确。", "alert");
    }
}

// 2. 法证级深层扫描 (Follow The Money)
async function triggerForensicScan() {
    if (!targetContract) return alert("请先连接钱包！");
    
    const btn = document.getElementById('btn-scan');
    btn.innerText = "资金流探测中...";
    document.getElementById('radar-scan').classList.remove('hidden');
    log("启动法证追踪... 正在检索是谁向 HR 局缴纳了押金...", "action");

    try {
        const currentBlock = await provider.getBlockNumber();
        // 扫描过去近 3 天的区块，分 10 个批次以防 RPC 阻断
        const chunks = 10;
        const blocksPerChunk = 50000;
        const startBlock = Math.max(0, currentBlock - (chunks * blocksPerChunk));
        
        // 尝试读取代币地址
        let tokenAddr;
        try {
            tokenAddr = await targetContract.nfsToken();
        } catch(e) {
            tokenAddr = "0x5717fc43060AD2F9069eC600eA691eb256aB69a6"; // Fallback
        }
        
        const tokenContract = new ethers.Contract(tokenAddr, erc20Abi, provider);
        const hrAddress = targetContract.address;

        for(let i=0; i<chunks; i++) {
            let from = startBlock + (i * blocksPerChunk);
            let to = from + blocksPerChunk - 1;
            if(to > currentBlock) to = currentBlock;

            try {
                // 核心突破：监听所有转账给 HR 的 Transfer 事件
                const transferFilter = tokenContract.filters.Transfer(null, hrAddress);
                const txEvents = await tokenContract.queryFilter(transferFilter, from, to);
                
                txEvents.forEach(e => {
                    if(e.args.from) trackedAgents.add(e.args.from.toLowerCase());
                });

                // 兼容扫描老版本的直接入职事件
                const filterHired = targetContract.filters.AgentHired();
                const hiredEvents = await targetContract.queryFilter(filterHired, from, to);
                hiredEvents.forEach(e => {
                    if(e.args.agent) trackedAgents.add(e.args.agent.toLowerCase());
                });
            } catch (err) {
                // Ignore chunk errors
            }
        }
        
        log(`扫描完成！顺着资金线索，我们锁定了 ${trackedAgents.size} 个嫌疑地址。正在核对入职档案...`, "success");
        await renderRoster();
        
    } catch (e) {
        log(`雷达扫描异常: ${e.message}`, "alert");
    } finally {
        btn.innerText = "🔄 启动资金追踪雷达";
        document.getElementById('radar-scan').classList.add('hidden');
    }
}

// 3. 终极防呆：强行手动追踪
async function addManualAgent() {
    if(!targetContract) return alert("请先连接钱包！");
    const input = document.getElementById('manual-address').value.trim();
    if(ethers.utils.isAddress(input)) {
        trackedAgents.add(input.toLowerCase());
        log(`已挂载手动目标: ${input}。开始提取底层数据。`, "action");
        document.getElementById('manual-address').value = '';
        await renderRoster();
    } else {
        alert("请输入正确的以太坊 0x 地址！");
    }
}

// 4. 渲染矩阵 (多版本 ABI 容错读取)
async function renderRoster() {
    if (trackedAgents.size === 0) {
        listEl.innerHTML = '<tr><td colspan="5" class="py-10 text-center text-slate-600">区块深处未发现近期活动。如果您确认 Python 脚本在运行，请直接在上方输入框【强行追踪】您的员工地址。</td></tr>';
        return;
    }

    listEl.innerHTML = '';
    const contractAddr = targetContract.address;
    const contractV3 = new ethers.Contract(contractAddr, abiV3, provider);
    const contractV2 = new ethers.Contract(contractAddr, abiV2, provider);
    
    for (let addr of trackedAgents) {
        let isActive = false;
        let stakedAmount = "0";
        let agentType = "Unknown";
        let isValid = false;

        // 尝试用 V3 结构读取
        try {
            const dataV3 = await contractV3.workforce(addr);
            isActive = dataV3.isActive;
            stakedAmount = ethers.utils.formatUnits(dataV3.stakedAmount, 18);
            agentType = "V3 架构";
            if(parseFloat(stakedAmount) > 0) isValid = true;
        } catch (e3) {
            // 如果报错，说明可能是 V2 结构，尝试用 V2 读取
            try {
                const dataV2 = await contractV2.workforce(addr);
                isActive = dataV2.isActive;
                stakedAmount = ethers.utils.formatUnits(dataV2.stakedAmount, 18);
                agentType = "V2 架构";
                if(dataV2.role !== "") isValid = true;
            } catch (err) {
                // 确实不是员工
            }
        }

        if (isValid || parseFloat(stakedAmount) > 0) {
            const tr = document.createElement('tr');
            tr.className = "border-b border-slate-800/50 hover:bg-slate-900/50 transition";
            
            const statusHtml = isActive 
                ? `<span class="status-dot bg-green-500 mr-2"></span><span class="text-emerald-400 font-bold">ACTIVE</span>`
                : `<span class="status-dot bg-red-500 mr-2"></span><span class="text-red-500 font-bold">SLASHED</span>`;
            
            const actionBtn = isActive
                ? `<button onclick="executeSlashing('${addr}')" class="btn-slash px-3 py-1.5 rounded text-[10px]">一键没收充公</button>`
                : `<span class="text-slate-600 text-[10px]">资产已清零</span>`;

            tr.innerHTML = `
                <td class="py-4 pl-2 text-cyan-400 font-mono">${addr.substring(0,10)}...${addr.substring(36)}</td>
                <td class="py-4 text-slate-400 text-[10px]">${agentType}</td>
                <td class="py-4 text-center">${statusHtml}</td>
                <td class="py-4 text-right text-amber-400 font-bold font-mono">${isActive ? stakedAmount : '0.0'} NFS</td>
                <td class="py-4 text-right pr-2">${actionBtn}</td>
            `;
            listEl.appendChild(tr);
        }
    }
}

// 5. 跨版本自动处决
async function executeSlashing(target) {
    if(!confirm("⚠️ 帝国最高行政指令 ⚠️\n\n确认物理开除该节点并没收其所有押金？此操作不可逆！")) return;
    
    log(`>>> 正在向以太坊广播处决令: ${target} <<<`, "alert");
    
    let tx;
    try {
        tx = await targetContract.slashAgent(target);
    } catch (e1) {
        try {
            tx = await targetContract.terminateAndSlash(target);
        } catch (e2) {
            log(`执行被拒绝: 您可能不是该合约的 CEO 或缺少权限。`, "alert");
            return;
        }
    }

    log(`处决令已发送！等待 Arbitrum 打包确认... (Hash: ${tx.hash.substring(0,10)}...)`, "info");
    await tx.wait();
    log(`💀 执法成功。资产已强行扣入国库。`, "success");
    triggerForensicScan();
}
</script>
</body>
</html>
